<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4945FF"/>
      <stop offset="100%" style="stop-color:#271FE0"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0efff;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1a1169" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="80" fill="url(#bg)"/>

  <!-- Card -->
  <rect x="110" y="108" width="380" height="384" rx="20" fill="url(#card)" filter="url(#shadow)"/>

  <!-- Drag handle dots — row 1 -->
  <circle cx="155" cy="182" r="5" fill="#C0BFF8"/>
  <circle cx="175" cy="182" r="5" fill="#C0BFF8"/>

  <!-- Field row 1 label -->
  <rect x="196" y="172" width="80" height="10" rx="5" fill="#C0BFF8"/>
  <!-- Field row 1 input -->
  <rect x="196" y="190" width="254" height="28" rx="8" fill="#F0EFFF" stroke="#E0DFFE" stroke-width="1.5"/>

  <!-- Drag handle dots — row 2 -->
  <circle cx="155" cy="254" r="5" fill="#C0BFF8"/>
  <circle cx="175" cy="254" r="5" fill="#C0BFF8"/>

  <!-- Field row 2 label -->
  <rect x="196" y="244" width="60" height="10" rx="5" fill="#C0BFF8"/>
  <!-- Field row 2 input -->
  <rect x="196" y="262" width="254" height="28" rx="8" fill="#F0EFFF" stroke="#E0DFFE" stroke-width="1.5"/>

  <!-- Drag handle dots — row 3 (textarea) -->
  <circle cx="155" cy="326" r="5" fill="#C0BFF8"/>
  <circle cx="175" cy="326" r="5" fill="#C0BFF8"/>

  <!-- Field row 3 label -->
  <rect x="196" y="316" width="70" height="10" rx="5" fill="#C0BFF8"/>
  <!-- Field row 3 textarea -->
  <rect x="196" y="334" width="254" height="56" rx="8" fill="#F0EFFF" stroke="#E0DFFE" stroke-width="1.5"/>
  <!-- textarea lines -->
  <rect x="212" y="350" width="140" height="6" rx="3" fill="#C0BFF8" opacity="0.6"/>
  <rect x="212" y="364" width="100" height="6" rx="3" fill="#C0BFF8" opacity="0.4"/>

  <!-- Divider -->
  <line x1="130" y1="418" x2="470" y2="418" stroke="#E0DFFE" stroke-width="1.5"/>

  <!-- Submit button -->
  <rect x="196" y="432" width="118" height="36" rx="10" fill="#4945FF"/>
  <rect x="222" y="446" width="66" height="8" rx="4" fill="white" opacity="0.9"/>

  <!-- Drag indicator arrow (right side accent) -->
  <g opacity="0.85">
    <rect x="490" y="222" width="32" height="32" rx="8" fill="#7B79FF"/>
    <text x="506" y="243" font-family="Arial" font-size="18" fill="white" text-anchor="middle">↕</text>
  </g>
  <g opacity="0.6">
    <rect x="490" y="294" width="32" height="32" rx="8" fill="#7B79FF"/>
    <text x="506" y="315" font-family="Arial" font-size="18" fill="white" text-anchor="middle">↕</text>
  </g>
</svg>
